  <script type="module">

    const firebaseConfig = {

    // ── FRAME SCRUBBER BACKGROUND ─────────────
    const FRAMES = Array.from({length: 50}, (_, i) => `frames/${String(i+1).padStart(3,'0')}.jpg`);
    const frameCanvas = document.getElementById('frame-canvas');
    const fctx = frameCanvas.getContext('2d');
    let currentFrame = 0, targetFrame = 0, frameImages = [], framesLoaded = 0;
    let allFramesLoaded = false, justFinishedLoading = false;
    let frameDPR = window.devicePixelRatio || 1;
    let curMouseXf = 0, curMouseYf = 0; // for subtle parallax offset in the frame draw

    function resizeFrameCanvas() {
      frameDPR = Math.min(window.devicePixelRatio || 1, 2.5);
      frameCanvas.width = Math.round(window.innerWidth * frameDPR);
      frameCanvas.height = Math.round(window.innerHeight * frameDPR);
      fctx.setTransform(frameDPR, 0, 0, frameDPR, 0, 0);
      fctx.imageSmoothingEnabled = true;
      fctx.imageSmoothingQuality = 'high';
      drawFrame(currentFrame);
    }
    resizeFrameCanvas();
    window.addEventListener('resize', resizeFrameCanvas);

    // Load frames strictly in order, one at a time — this guarantees frame 5
    // is never available before frame 4, so there's no possibility of frames
    // arriving out of sequence. While loading, the scrubber still responds
    // immediately using whatever's loaded so far — if you scroll ahead of
    // what's ready, it clamps to the furthest frame actually loaded (never
    // freezes, never jumps backward to an earlier frame), so it always reads
    // as smooth forward progress instead of getting stuck.
    async function preloadFrames() {
      for (let i = 0; i < FRAMES.length; i++) {
        await new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            frameImages[i] = img;
            framesLoaded = i + 1;
            if (i === 0) drawFrame(0);
            resolve();
          };
          img.onerror = resolve; // don't let one bad frame stall the rest
          img.src = FRAMES[i];
        });
      }
      allFramesLoaded = true;
    }
    preloadFrames();

    function drawFrame(pos) {
      const maxLoadedIdx = framesLoaded - 1;
      if (maxLoadedIdx < 0) return; // nothing loaded yet
      // pos may be an unwrapped, ever-increasing value (see frameLoop) —
      // wrap it into a valid frame index here, in one place, so every
      // caller can just pass currentFrame/0 without worrying about it.
      const wrapped = ((pos % FRAMES.length) + FRAMES.length) % FRAMES.length;
      let i0 = Math.round(wrapped);
      if (i0 >= FRAMES.length) i0 = 0; // guard the round-up-to-length edge case
      if (i0 > maxLoadedIdx) i0 = maxLoadedIdx; // clamp to furthest loaded frame, never show a gap
      const imgA = frameImages[i0];
      if (!fctx || !imgA) return;
      const cw = window.innerWidth, ch = window.innerHeight;
      const scale = Math.max(cw / imgA.width, ch / imgA.height) * 1.08;
      const dw = imgA.width * scale, dh = imgA.height * scale;
      const ox = (cw - dw) / 2 + (curMouseXf / cw - 0.5) * -18;
      const oy = (ch - dh) / 2 + (curMouseYf / ch - 0.5) * -10;
      fctx.clearRect(0, 0, cw, ch);
      fctx.globalAlpha = 1;
      fctx.drawImage(imgA, ox, oy, dw, dh);
    }

    (function frameLoop() {
      currentFrame += (targetFrame - currentFrame) * 0.35;
      if (Math.abs(targetFrame - currentFrame) < 0.05) currentFrame = targetFrame;
      drawFrame(currentFrame); // currentFrame is unwrapped — drawFrame wraps it internally
      requestAnimationFrame(frameLoop);
    })();

    let maxScrollLeftSeen = 0;
    const FRAME_DEBUG = false; // flip to true in devtools console to see live scroll/frame numbers

    // Distance-based forward loop: advance one frame every PX_PER_FRAME
    // pixels of scroll, and once you've scrolled far enough to pass frame
    // 50, wrap straight back to frame 1 and keep going — matching what was
    // actually asked for. (An earlier version made this bounce back and
    // forth instead, on the theory that a bounce reads better than a cut;
    // in practice that meant it deliberately played frames backward on
    // every turnaround, which is exactly the "glitch" being reported —
    // so that's gone now.)
    //
    // targetFrame itself is left unwrapped (ever-increasing) rather than
    // wrapped to 0-49 here, specifically so frameLoop's easing above is
    // always closing a small forward gap and never has to rewind through
    // the whole sequence to get from e.g. frame 49.8 to frame 0.2.
    const PX_PER_FRAME = 120; // tune: smaller = faster frame cycling per pixel scrolled

    // Trying to distinguish "real" backward scroll from "noisy" backward
    // scroll (momentum decay, elastic rubber-band overscroll at the shelf's
    // edges, etc.) is fragile — rubber-band bounce in particular can easily
    // be bigger than any dead-zone threshold, so it kept slipping through.
    // The animation doesn't actually need to track true backward scrolling:
    // it only needs to track total distance traveled, so it can simply
    // never go backward. maxScrollLeftSeen is strictly monotonic — it only
    // ever holds, never decreases — which makes a visible regression
    // impossible regardless of what's causing the scrollLeft noise.
    function updateFrameFromScroll() {
      const maxScroll = shelfEl.scrollWidth - shelfEl.clientWidth;
      if (maxScroll <= 0) return;
      const raw = shelfEl.scrollLeft;
      if (raw <= maxScrollLeftSeen) return; // never move backward — hold position
      maxScrollLeftSeen = raw;

      targetFrame = maxScrollLeftSeen / PX_PER_FRAME; // unwrapped — keeps growing forever
      if (window.FRAME_DEBUG) console.log('[frame] raw:', raw, 'maxScrollLeftSeen:', maxScrollLeftSeen, 'targetFrame:', targetFrame.toFixed(2), 'currentFrame:', currentFrame.toFixed(2));
    }
    document.addEventListener('mousemove', e => { curMouseXf = e.clientX; curMouseYf = e.clientY; });

    // ── CURSOR EMBER TRAIL ────────────────────
    const canvas = document.getElementById('trail-canvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    document.addEventListener('mousemove', e => {
      for (let i = 0; i < 2; i++) {
        particles.push({
          x: e.clientX + (Math.random()-0.5)*5,
          y: e.clientY + (Math.random()-0.5)*5,
          life: 1,
          size: Math.random()*1.4+0.7,
          vx: (Math.random()-0.5)*0.6,
          vy: -Math.random()*0.9 - 0.2, // embers drift upward, not randomly in all directions
          hue: 10 + Math.random()*25,
          flicker: Math.random()*Math.PI*2
        });
      }
      if (particles.length > 90) particles = particles.slice(-90);
    });

    function animateTrail() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0.01);
      particles.forEach(p => {
        p.life -= 0.022;
        p.x += p.vx;
        p.y += p.vy;
        p.vy -= 0.006; // gentle upward acceleration, like real embers
        p.flicker += 0.15;
        const flick = 0.8 + Math.sin(p.flicker)*0.2;
        const a = p.life * 0.65 * flick;
        const r = Math.max(0.1, p.size * p.life);
        ctx.fillStyle = `hsl(${p.hue}, 95%, 58%)`;
        // cheap soft glow: wide faint circle + small bright core (no shadowBlur)
        ctx.globalAlpha = a * 0.35;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r*2.2, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(animateTrail);
    }
    animateTrail();

    // ── AMBIENT EMBER RAIN ────────────────────
    const emberCanvas = document.getElementById('ember-canvas');
    const ectx = emberCanvas ? emberCanvas.getContext('2d') : null;
    if (emberCanvas) { emberCanvas.width=innerWidth; emberCanvas.height=innerHeight; window.addEventListener('resize',()=>{emberCanvas.width=innerWidth;emberCanvas.height=innerHeight;}); }
    const embers = [];
    const EMBER_COUNT = 26;
    function newEmber(randomY) {
      const depth = Math.random();
      return {
        x: Math.random() * innerWidth,
        y: randomY ? Math.random() * innerHeight : innerHeight + 10,
        size: 0.8 + depth * 3.5,
        speed: 0.3 + depth * 1.2,
        drift: (Math.random() - 0.5) * 0.4,
        opacity: 0.15 + depth * 0.55,
        hue: 15 + Math.random() * 25,
        depth,
        flicker: Math.random() * Math.PI * 2
      };
    }
    function initEmbers() { for (let i=0;i<EMBER_COUNT;i++) embers.push(newEmber(true)); }
    (function emberLoop() {
      if (!ectx) { requestAnimationFrame(emberLoop); return; }
      ectx.clearRect(0, 0, emberCanvas.width, emberCanvas.height);
      embers.forEach((e, i) => {
        e.y -= e.speed;
        e.x += e.drift;
        e.flicker += 0.04;
        const flick = 0.85 + Math.sin(e.flicker) * 0.15;
        if (e.y < -10) embers[i] = newEmber(false);
        const a = e.opacity * flick, r = Math.max(0.1, e.size * flick);
        ectx.fillStyle = `hsl(${e.hue}, 95%, 60%)`;
        ectx.globalAlpha = a * 0.35;
        ectx.beginPath();
        ectx.arc(e.x, e.y, r * 2.2, 0, Math.PI*2);
        ectx.fill();
        ectx.globalAlpha = a;
        ectx.beginPath();
        ectx.arc(e.x, e.y, r, 0, Math.PI*2);
        ectx.fill();
      });
      ectx.globalAlpha = 1;
      requestAnimationFrame(emberLoop);
    })();
    initEmbers();

    // ── TITLE PARALLAX ────────────────────────
    let mouseX=0, mouseY=0, curMouseX=0, curMouseY=0;
    document.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });
    (function parallaxLoop(){
      curMouseX += (mouseX-curMouseX)*0.06;
      curMouseY += (mouseY-curMouseY)*0.06;
      const cx=(curMouseX/innerWidth-0.5)*2;
      const cy=(curMouseY/innerHeight-0.5)*2;
      const heroMain=document.querySelector('.hero-img');
      const heroAccentEl=document.querySelector('.hero-accent');
      if(heroMain) heroMain.style.transform=`scale(1.02) translate(${cx*-8}px,${cy*-4}px)`;
      if(heroAccentEl) heroAccentEl.style.transform=`translate(${cx*-14}px,${cy*-7}px)`;
      requestAnimationFrame(parallaxLoop);
    })();

    // ── SOUND ────────────────────────────────
    let soundEnabled = false;
    const muteBtn = document.getElementById('mute-btn');
    const bgMusic = document.getElementById('bg-music');
    bgMusic.volume = 0.4;
    bgMusic.preload = 'auto';
    bgMusic.load();
    muteBtn.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      muteBtn.textContent = soundEnabled ? '🔊' : '🔇';
      if (soundEnabled) {
        bgMusic.play().then(() => {
          console.log('bg music playing, readyState:', bgMusic.readyState, 'duration:', bgMusic.duration);
        }).catch(err => {
          console.error('bg music failed to play:', err.name, err.message);
        });

        bgMusic.pause();
      }

    // ── HIDDEN MESSAGE ───────────────────────
    const easterDot = document.getElementById('easter-dot');
    const easterOverlay = document.getElementById('easter-overlay');
    if (easterDot && easterOverlay) {
      easterDot.addEventListener('click', () => {
        easterOverlay.classList.add('active');
        setTimeout(() => easterOverlay.classList.remove('active'), 4000);
      });
      easterOverlay.addEventListener('click', () => easterOverlay.classList.remove('active'));
    }

    function playClick() {
      if (!soundEnabled) return;
      try {
        const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx2.createOscillator();
        const gain = ctx2.createGain();
        osc.connect(gain); gain.connect(ctx2.destination);
        osc.frequency.setValueAtTime(800, ctx2.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx2.currentTime + 0.06);
        gain.gain.setValueAtTime(0.08, ctx2.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.08);
        osc.start(); osc.stop(ctx2.currentTime + 0.08);
      } catch(e) {}
    }

    function playHover() {
      if (!soundEnabled) return;
      try {
        const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx2.createOscillator();
        const gain = ctx2.createGain();
        osc.connect(gain); gain.connect(ctx2.destination);
        osc.frequency.setValueAtTime(600, ctx2.currentTime);
        gain.gain.setValueAtTime(0.03, ctx2.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.04);
        osc.start(); osc.stop(ctx2.currentTime + 0.04);
      } catch(e) {}
    }

    // ── TOAST ────────────────────────────────
    function showToast(title, sub='', icon='✓') {
      document.getElementById('toast-title').textContent = title;
      document.getElementById('toast-sub').textContent = sub;
      document.getElementById('toast-icon').textContent = icon;
      toastEl.classList.add('show');

    // ── XP LOADING BAR ───────────────────────
    function showXP() {
      xpWrap.style.opacity = '1';
      xpFill.style.width = '0%';
      let pct = 0;
      const interval = setInterval(() => {
        pct += Math.random() * 8 + 2;
        if (pct >= 100) { pct = 100; clearInterval(interval); setTimeout(() => { xpWrap.style.opacity = '0'; }, 400); }
        xpFill.style.width = pct + '%';
      }, 80);
    }

    // ── COUNT UP ANIMATION ───────────────────
    function countUp(el, target) {
      let current = 0;
      const step = Math.ceil(target / 30);
      const timer = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = current;
        if (current >= target) clearInterval(timer);
      }, 30);
    }

    // ── ARCHIVE NAME ─────────────────────────
    nameImg.addEventListener('click', () => {
      document.getElementById('edit-name-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('edit-name-input').focus(), 100);
      playClick();
    });

    document.getElementById('edit-name-close').addEventListener('click', () => { document.getElementById('edit-name-overlay').classList.remove('active'); document.body.style.overflow = ''; });
    document.getElementById('edit-name-overlay').addEventListener('click', e => { if (e.target === document.getElementById('edit-name-overlay')) { document.getElementById('edit-name-overlay').classList.remove('active'); document.body.style.overflow = ''; } });
    document.getElementById('btn-save-name').addEventListener('click', async () => {
      const name = document.getElementById('edit-name-input').value.trim();
      if (!name) return;
      await setDoc(doc(db,'meta','archive'), {name});
      document.title = name + "'S GAME ARCHIVE";
      document.getElementById('edit-name-overlay').classList.remove('active');
      document.body.style.overflow = '';
      showToast('Archive name updated', '', '✎');
      playClick();
    });

    // ── LOAD GAMES ───────────────────────────
    async function loadAll() {
      showXP();
      try {
        const [cSnap, bSnap] = await Promise.all([
          getDocs(query(collection(db,'games'), orderBy('number'))),
          getDocs(query(collection(db,'backlog'), orderBy('number')))
        ]);
        completedGames = cSnap.docs.map(d => ({id:d.id,...d.data()}));
        backlogGames   = bSnap.docs.map(d => ({id:d.id,...d.data()}));
        try {
          const oSnap = await getDocs(query(collection(db,'ours'), orderBy('number')));
          oursGames = oSnap.docs.map(d => ({id:d.id,...d.data()}));
        } catch(e) { oursGames = []; console.log('ours collection empty or not created yet'); }
        updateCounts();
        buildGenreBar();
        buildPills();
        renderCurrentView();
      } catch(e) {
        shelfEl.innerHTML = '<div class="empty" style="color:#e01f1f;">FAILED TO LOAD. CHECK CONSOLE.</div>';
        console.error(e);
      }
    }

    function updateCounts() {
      countUp(totalEl, completedGames.length);
      countUp(backlogEl, backlogGames.length);
      countUp(reviewedEl, completedGames.filter(g=>g.review).length);
    }

    // ── TABS ─────────────────────────────────
    let lastTabIndex = 0;
    const tabOrder = ['completed','backlog','ours'];
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        activeFilter = 'all'; searchQuery = ''; searchEl.value = ''; sortEl.value = 'number'; activeSort = 'number';
        reviewedFilter = false;
        document.getElementById('reviewed-stat').classList.remove('stat-active');
        maxScrollLeftSeen = 0;
        targetFrame = 0;
        currentFrame = 0;

        // fly transition: direction depends on which tab we're moving toward
        const newIndex = tabOrder.indexOf(activeTab);
        const dir = newIndex >= lastTabIndex ? 1 : -1; // 1 = moving right (fly out left), -1 = moving left (fly out right)
        lastTabIndex = newIndex;

        shelfEl.style.transition = 'opacity 0.22s var(--ease), transform 0.22s var(--ease)';
        shelfEl.style.opacity = '0';
        shelfEl.style.transform = `translateX(${dir * -60}px)`;
        setTimeout(() => {
          buildGenreBar(); buildPills(); renderCurrentView();
          shelfEl.style.transition = 'none';
          shelfEl.style.transform = `translateX(${dir * 60}px)`;
          // force reflow so the browser registers the start position before animating in
          void shelfEl.offsetWidth;
          shelfEl.style.transition = 'opacity 0.28s var(--ease), transform 0.28s var(--ease)';
          shelfEl.style.opacity = '1';
          shelfEl.style.transform = 'translateX(0)';
        }, 220);
        playClick();
      });
    });

    // ── GENRE BAR ────────────────────────────
    function buildGenreBar() {
      const games = activeTab === 'completed' ? completedGames : activeTab === 'backlog' ? backlogGames : oursGames;
      const counts = {};
      games.forEach(g => { const genre=(g.genre||'unknown').split('·')[0].trim().toLowerCase(); counts[genre]=(counts[genre]||0)+1; });
      const total = games.length || 1;
      genreBarEl.innerHTML = '';
      Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6).forEach(([,count]) => {
        const seg=document.createElement('div'); seg.className='genre-seg'; seg.style.width=(count/total*100).toFixed(1)+'%'; genreBarEl.appendChild(seg);
      });
    }

    // ── PILLS ────────────────────────────────
    function buildPills() {
      const games = activeTab === 'completed' ? completedGames : activeTab === 'backlog' ? backlogGames : oursGames;
      const genres = [...new Set(games.map(g=>(g.genre||'').split('·')[0].trim().toLowerCase()).filter(Boolean))].sort();
      pillsEl.innerHTML = '<button class="pill active" data-filter="all">ALL</button>';
      genres.slice(0,8).forEach(genre => {
        const btn=document.createElement('button'); btn.className='pill'; btn.dataset.filter=genre; btn.textContent=genre.toUpperCase(); pillsEl.appendChild(btn);
      });
      pillsEl.querySelectorAll('.pill').forEach(btn => {
        btn.addEventListener('click', () => {
          pillsEl.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
          activeFilter=btn.dataset.filter; renderCurrentView(); playClick();
        });
      });
    }

    document.getElementById('reviewed-stat').addEventListener('click', () => {
      reviewedFilter = !reviewedFilter;
      const statEl = document.getElementById('reviewed-stat');
      if (reviewedFilter) {
        statEl.classList.add('stat-active');
        if (activeTab !== 'completed') {
          document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
          document.querySelector('.tab[data-tab="completed"]').classList.add('active');
          activeTab = 'completed';
          lastTabIndex = tabOrder.indexOf('completed');
        }
        activeFilter = 'all'; searchQuery = ''; searchEl.value = '';
        buildGenreBar(); buildPills();
      } else {
        statEl.classList.remove('stat-active');
      }
      renderCurrentView();
      playClick();
    });

    // ── RENDER SHELF ─────────────────────────
    function getFilteredGames() {
      let games = activeTab==='completed' ? [...completedGames] : activeTab==='backlog' ? [...backlogGames] : [...oursGames];
      if (activeFilter!=='all') games=games.filter(g=>(g.genre||'').toLowerCase().includes(activeFilter));
      if (searchQuery) games=games.filter(g=>g.title.toLowerCase().includes(searchQuery.toLowerCase()));
      if (reviewedFilter && activeTab==='completed') games=games.filter(g=>!!g.review);
      if (activeSort==='alpha')      games.sort((a,b)=>a.title.localeCompare(b.title));
      if (activeSort==='rating')     games.sort((a,b)=>(b.rating||0)-(a.rating||0));
      if (activeSort==='metacritic') games.sort((a,b)=>(b.metacritic||0)-(a.metacritic||0));
      return games;
    }

    function renderCurrentView() { gridMode ? renderGrid(getFilteredGames()) : renderShelf(); }

    function renderShelf() {
      let games = getFilteredGames();

      shelfEl.innerHTML = '';
      if (!games.length) { shelfEl.innerHTML='<div class="empty">NO ENTRIES FOUND.</div>'; return; }

      games.forEach((game, i) => {
        const card = buildCard(game, i, false);
        shelfEl.appendChild(card);
      });

      // Staggered entrance
      const cards = shelfEl.querySelectorAll('.shelf-card');
      cards.forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(24px) scale(0.92)';
        card.style.filter = 'blur(4px)';
        setTimeout(() => {
          card.style.transition = 'opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1), filter 0.5s cubic-bezier(0.16,1,0.3,1)';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0) scale(1)';
          card.style.filter = 'blur(0px)';
        }, i * 40);
      });

      setTimeout(applyConvex, 200);
      updateScrollbar();
    }

    function renderGrid(games) {
      gridEl.innerHTML = '';
      if (!games.length) { gridEl.innerHTML='<div class="empty">NO ENTRIES FOUND.</div>'; return; }
      games.forEach((game, i) => {
        const card = buildCard(game, i, true);
        card.style.opacity = '0';
        card.style.transform = 'translateY(16px) scale(0.94)';
        card.style.filter = 'blur(3px)';
        gridEl.appendChild(card);
        setTimeout(() => {
          card.style.transition = 'opacity .4s cubic-bezier(.16,1,.3,1), transform .4s cubic-bezier(.16,1,.3,1), filter .4s cubic-bezier(.16,1,.3,1)';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0) scale(1)';
          card.style.filter = 'blur(0px)';
        }, i * 25);
      });
    }

    document.getElementById('btn-grid').addEventListener('click', () => {
      gridMode = !gridMode;
      const btn = document.getElementById('btn-grid');
      if (gridMode) {
        shelfWrapEl.style.display = 'none';
        gridWrapEl.style.display = 'block';
        renderGrid(getFilteredGames());
        btn.textContent = '≡';
      } else {
        shelfWrapEl.style.display = 'block';
        gridWrapEl.style.display = 'none';
        renderCurrentView();
        btn.textContent = '⊞';
      }
      playClick();
    });

    // ── BUILD CARD ───────────────────────────
    function buildCard(game, index, isGrid) {
      const card = document.createElement('div');
      card.className = isGrid ? 'grid-card' : 'shelf-card';
      card.dataset.id = game.id;

      const ratingBadge = game.rating ? `<div class="card-badge">${game.rating}/10</div>` : '';
      const metaBadge   = game.metacritic ? `<div class="card-meta" style="background:${metacriticColor(game.metacritic)}">${game.metacritic}</div>` : '';
      const reviewDot   = game.review ? '<div class="card-dot"></div>' : '';
      const playingDot  = game.status==='Playing' ? '<div class="card-playing-dot" title="Currently Playing"></div>' : '';
      const hltb        = game.hltb ? `<span class="card-hltb">${game.hltb}</span>` : '';

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-cover-wrap">
            ${game.coverUrl
              ? `<img class="card-cover" src="${game.coverUrl}" alt="${game.title}" loading="lazy"/>`
              : `<div class="card-no-art">NO ART</div>`
            }
            <div class="card-spotlight"></div>
            <div class="card-reveal">
              <div class="card-reveal-num">//${String(game.number||index+1).padStart(3,'0')}</div>
              <div class="card-reveal-name">${game.title}</div>
              <div class="card-reveal-cta">VIEW ENTRY ›</div>
            </div>
            ${ratingBadge}${metaBadge}${reviewDot}${playingDot}
          </div>
          <div class="card-body">
            <div class="card-num">//${String(game.number||index+1).padStart(3,'0')}</div>
            <div class="card-name">${game.title}</div>
            <div class="card-foot">
              <span class="card-genre">${(game.genre||'—').split('·')[0].trim().toUpperCase()}</span>
              ${hltb}
            </div>
          </div>
        </div>
        <div class="card-floor-glow"></div>
      `;

      const inner    = card.querySelector('.card-inner');
      const spotlight = card.querySelector('.card-spotlight');
      const floorGlow = card.querySelector('.card-floor-glow');
      let rafId;

      card.addEventListener('mouseenter', () => { playHover(); if (floorGlow) floorGlow.style.opacity='1'; });

      card.addEventListener('mousemove', e => {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
          const r   = card.getBoundingClientRect();
          const x   = e.clientX - r.left;
          const y   = e.clientY - r.top;
          const cx  = (x - r.width/2)  / (r.width/2);
          const cy  = (y - r.height/2) / (r.height/2);

          // 3D tilt
          inner.style.transform = `perspective(700px) rotateY(${cx*10}deg) rotateX(${-cy*6}deg) translateY(-20px) scale(1.06)`;
          inner.style.boxShadow = `${-cx*8}px ${-cy*4}px 40px rgba(224,31,31,0.25), 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px #e01f1f`;

          // Spotlight
          spotlight.style.background = `radial-gradient(circle 120px at ${x}px ${y}px, rgba(224,31,31,0.3) 0%, transparent 70%)`;
        });
      });

      card.addEventListener('mouseleave', () => {
        if (rafId) cancelAnimationFrame(rafId);
        inner.style.transform = '';
        inner.style.boxShadow = '';
        spotlight.style.background = 'none';
        if (floorGlow) floorGlow.style.opacity='0';
      });

      card.addEventListener('click', () => { openModal(game); playClick(); });
      return card;
    }

    function metacriticColor(s) {
      if (s >= 90) return '#2d6e2d';
      if (s >= 75) return '#4a7a2a';
      if (s >= 60) return '#7a6a15';
      return '#7a1515';
    }

    // ── CONVEX SHELF ─────────────────────────
    function applyConvex() {
      const cards  = shelfEl.querySelectorAll('.shelf-card');
      const center = shelfEl.scrollLeft + shelfEl.clientWidth / 2;
      const halfW  = shelfEl.clientWidth * 0.5;
      cards.forEach(card => {
        const cc     = card.offsetLeft + card.offsetWidth / 2;
        const signedDist = center - cc; // negative = card is right of center, positive = left of center
        const dist   = Math.abs(signedDist);
        const norm   = Math.min(dist / halfW, 1);
        const ty     = norm * norm * 26;
        const sc     = 1 - norm * 0.09;
        // curved-carousel tilt: cards angle toward the viewer based on how far
        // they sit from center, like they're arranged along a convex shelf
        const rotY   = (signedDist / halfW) * -12 * (1 - norm * 0.3);
        if (!card.matches(':hover')) {
          card.querySelector('.card-inner').style.transform = `perspective(1000px) rotateY(${rotY}deg) translateY(${ty}px) scale(${sc})`;
        }
      });
    }

    // ── SCROLLBAR ────────────────────────────
    function updateScrollbar() {
      const track = document.querySelector('.scrollbar-track');
      if (!track) return;
      const pct    = shelfEl.scrollLeft / Math.max(1, shelfEl.scrollWidth - shelfEl.clientWidth);
      const trackW = track.clientWidth;
      const thumbW = thumbEl.clientWidth;
      thumbEl.style.transform = `translateX(${pct*(trackW-thumbW)}px)`;
    }

    shelfEl.addEventListener('scroll', () => {
      requestAnimationFrame(() => { applyConvex(); updateScrollbar(); updateFrameFromScroll(); });
    });
    window.addEventListener('resize', () => { requestAnimationFrame(applyConvex); });

    // ── SHELF SCROLL INPUT ────────────────────
    // Convert vertical mouse-wheel scrolling into horizontal shelf movement —
    // without this, a normal mouse (vertical wheel only) cannot scroll the
    // shelf at all, since it only has horizontal content.
    shelfEl.addEventListener('wheel', e => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        e.preventDefault();
        shelfEl.scrollLeft += e.deltaY;
      }
    }, { passive: false });

    // Click-and-drag scrolling for mouse users
    let isDragging = false, dragStartX = 0, dragScrollStart = 0, dragMoved = false;
    shelfEl.addEventListener('mousedown', e => {
      if (e.target.closest('.card-inner')) return;
      isDragging = true;
      dragMoved = false;
      dragStartX = e.pageX;
      dragScrollStart = shelfEl.scrollLeft;
      shelfEl.style.cursor = 'grabbing';
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const delta = e.pageX - dragStartX;
      // require a small real movement before engaging — filters out accidental
      // micro-drags, and means a stray leftover isDragging=true can't silently
      // hijack scroll position from an otherwise-stationary mouse
      if (!dragMoved && Math.abs(delta) < 4) return;
      dragMoved = true;
      shelfEl.scrollLeft = dragScrollStart - delta;
    });
    function endDrag() {
      isDragging = false;
      dragMoved = false;
      shelfEl.style.cursor = 'grab';
    }
    document.addEventListener('mouseup', endDrag);
    // Safety nets: anything that could cause mouseup to never fire must also
    // reset drag state, otherwise isDragging gets stuck true forever and every
    // future mousemove on the page (even unrelated to scrolling) will forcibly
    // override scrollLeft using stale coordinates — this was very likely the
    // real cause of the shelf jumping backward on its own.
    window.addEventListener('blur', endDrag);
    document.addEventListener('mouseleave', endDrag);
    document.addEventListener('visibilitychange', () => { if (document.hidden) endDrag(); });

    // ── SEARCH + SORT ─────────────────────────
    searchEl.addEventListener('input', e => { searchQuery=e.target.value.trim(); renderCurrentView(); });
    sortEl.addEventListener('change',  e => { activeSort=e.target.value; renderCurrentView(); });

    // ── MODAL ────────────────────────────────
    function openModal(game) {
      currentId = game.id; currentRating = game.rating||0;
      const isCompleted = activeTab === 'completed';

      if (game.coverUrl) { modalCover.src=game.coverUrl; modalCover.style.display='block'; modalCoverPh.style.display='none'; }
      else { modalCover.style.display='none'; modalCoverPh.style.display='flex'; }

      modalNumber.textContent = `//${String(game.number||'').padStart(3,'0')}`;
      modalTitle.textContent  = game.title;
      modalGenre.textContent  = (game.genre||'UNKNOWN').toUpperCase();
      modalDesc.textContent   = game.description||'';

      modalMeta.innerHTML = `
        ${game.metacritic ? `<div class="meta-row"><span class="meta-label">METACRITIC</span><span class="meta-val" style="color:${metacriticColor(game.metacritic)};font-weight:700;">${game.metacritic}</span></div>` : ''}
        <div class="meta-row"><span class="meta-label">YEAR</span><span class="meta-val">${game.year||'—'}</span></div>
        <div class="meta-row"><span class="meta-label">DEV</span><span class="meta-val">${game.developer||'—'}</span></div>
        <div class="meta-row"><span class="meta-label">PLATFORM</span><span class="meta-val"><input type="text" class="platform-input" id="modal-platform-input" value="${game.platform||''}" placeholder="PS5, PC..."/></span></div>
        <div class="meta-row"><span class="meta-label">HLTB</span><span class="meta-val">${game.hltb||'—'}</span></div>
        <div class="meta-row"><span class="meta-label">HOURS PLAYED</span><span class="meta-val"><input type="number" min="0" step="0.5" class="hours-input" id="modal-hours-input" value="${game.hoursPlayed!=null?game.hoursPlayed:''}" placeholder="0"/></span></div>
        <div class="meta-row"><span class="meta-label">DATE COMPLETED</span><span class="meta-val"><input type="date" class="date-input" id="modal-date-input" value="${game.dateCompleted||''}"/></span></div>
        <div class="meta-row meta-row-playing"><span class="meta-label">CURRENTLY PLAYING</span><span class="meta-val"><label class="playing-toggle"><input type="checkbox" id="modal-playing-check" ${game.status==='Playing'?'checked':''}/><span class="playing-toggle-dot"></span></label></span></div>
      `;

      const platformInput = document.getElementById('modal-platform-input');
      platformInput.addEventListener('change', async () => {
        if (!currentId) return;
        const col = activeTab==='completed' ? 'games' : activeTab==='backlog' ? 'backlog' : 'ours';
        await updateDoc(doc(db,col,currentId), {platform: platformInput.value});
        const arr = activeTab==='completed' ? completedGames : activeTab==='backlog' ? backlogGames : oursGames;
        const g = arr.find(x=>x.id===currentId); if (g) g.platform = platformInput.value;
        showToast('Platform updated','','🎮'); playClick();
      });

      const dateInput = document.getElementById('modal-date-input');
      dateInput.addEventListener('change', async () => {
        if (!currentId) return;
        const col = activeTab==='completed' ? 'games' : activeTab==='backlog' ? 'backlog' : 'ours';
        await updateDoc(doc(db,col,currentId), {dateCompleted: dateInput.value});
        const arr = activeTab==='completed' ? completedGames : activeTab==='backlog' ? backlogGames : oursGames;
        const g = arr.find(x=>x.id===currentId); if (g) g.dateCompleted = dateInput.value;
        showToast('Date updated','','📅'); playClick();
      });

      const hoursInput = document.getElementById('modal-hours-input');
      hoursInput.addEventListener('change', async () => {
        const val = hoursInput.value === '' ? null : parseFloat(hoursInput.value);
        if (!currentId) return;
        const col = activeTab==='completed' ? 'games' : activeTab==='backlog' ? 'backlog' : 'ours';
        await updateDoc(doc(db,col,currentId), {hoursPlayed: val});
        const arr = activeTab==='completed' ? completedGames : activeTab==='backlog' ? backlogGames : oursGames;
        const g = arr.find(x=>x.id===currentId); if (g) g.hoursPlayed = val;
        showToast('Hours updated','','⏱'); playClick();
      });

      const playingCheck = document.getElementById('modal-playing-check');
      playingCheck.addEventListener('change', async () => {
        if (!currentId) return;
        const col = activeTab==='completed' ? 'games' : activeTab==='backlog' ? 'backlog' : 'ours';
        const newStatus = playingCheck.checked ? 'Playing' : (activeTab==='completed'?'Completed':'To Play');
        await updateDoc(doc(db,col,currentId), {status: newStatus});
        const arr = activeTab==='completed' ? completedGames : activeTab==='backlog' ? backlogGames : oursGames;
        const g = arr.find(x=>x.id===currentId); if (g) g.status = newStatus;
        renderCurrentView();
        showToast(playingCheck.checked ? 'Marked as Playing' : 'Unmarked','','▶'); playClick();
      });

      reviewSection.style.display = isCompleted ? 'flex' : 'none';
      if (isCompleted) { reviewInput.value=game.review||''; commentsInput.value=game.comments||''; setStars(currentRating); saveConfirm.style.opacity='0'; document.getElementById('told-laali-check').checked = !!game.toldLaali; }

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() { overlay.classList.remove('active'); document.body.style.overflow=''; currentId=null; }
    modalClose.addEventListener('click', () => { closeModal(); playClick(); });
    overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });

    // ── EDIT TITLE ───────────────────────────
    editTitleBtn.addEventListener('click', () => {
      document.getElementById('edit-title-input').value = modalTitle.textContent;
      document.getElementById('edit-title-overlay').classList.add('active');
      setTimeout(() => document.getElementById('edit-title-input').focus(), 100);
      playClick();
    });
    document.getElementById('edit-title-close').addEventListener('click', () => document.getElementById('edit-title-overlay').classList.remove('active'));
    document.getElementById('edit-title-overlay').addEventListener('click', e => { if(e.target===document.getElementById('edit-title-overlay')) document.getElementById('edit-title-overlay').classList.remove('active'); });
    document.getElementById('btn-save-title').addEventListener('click', async () => {
      const t = document.getElementById('edit-title-input').value.trim();
      if (!t || !currentId) return;
      const col = activeTab==='completed'?'games':'backlog';
      await updateDoc(doc(db,col,currentId),{title:t});
      const arr = activeTab==='completed'?completedGames:backlogGames;
      const g = arr.find(x=>x.id===currentId); if(g) g.title=t;
      modalTitle.textContent = t;
      document.getElementById('edit-title-overlay').classList.remove('active');
      renderCurrentView(); showToast('Title updated','','✎'); playClick();
    });

    // ── STARS ────────────────────────────────
    function setStars(val) { stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.val)<=val)); }
    stars.forEach(s => {
      s.addEventListener('click', () => { currentRating=parseInt(s.dataset.val); setStars(currentRating); playClick(); });
      s.addEventListener('mouseover', () => setStars(parseInt(s.dataset.val)));
      s.addEventListener('mouseout', () => setStars(currentRating));
    });

    // ── SAVE REVIEW ──────────────────────────
    btnSave.addEventListener('click', async () => {
      if (!currentId) return;
      const toldLaali = document.getElementById('told-laali-check').checked;
      await updateDoc(doc(db,'games',currentId),{review:reviewInput.value,comments:commentsInput.value,rating:currentRating,toldLaali});
      const g = completedGames.find(x=>x.id===currentId);
      if(g) { g.review=reviewInput.value; g.comments=commentsInput.value; g.rating=currentRating; g.toldLaali=toldLaali; }
      saveConfirm.style.opacity='1';
      setTimeout(()=>saveConfirm.style.opacity='0',2000);
      updateCounts(); renderCurrentView();
      showToast('Review saved','Achievement unlocked: Critic','★'); playClick();
    });

    document.getElementById('btn-delete-game').addEventListener('click', async () => {
      if (!currentId) return;
      const col = activeTab==='completed' ? 'games' : activeTab==='backlog' ? 'backlog' : 'ours';
      const arr = activeTab==='completed' ? completedGames : activeTab==='backlog' ? backlogGames : oursGames;
      const g   = arr.find(x=>x.id===currentId);
      const title = g ? g.title : 'this game';
      if (!confirm(`Delete "${title}" from the archive? This can't be undone.`)) return;
      await deleteDoc(doc(db,col,currentId));
      const idx = arr.findIndex(x=>x.id===currentId);
      if (idx > -1) arr.splice(idx,1);
      closeModal();
      updateCounts(); buildGenreBar(); buildPills(); renderCurrentView();
      showToast(title+' removed','','🗑'); playClick();
    });

    // ── ADD GAME ─────────────────────────────
    document.getElementById('btn-add-game').addEventListener('click', () => { document.getElementById('add-overlay').classList.add('active'); document.body.style.overflow='hidden'; playClick(); });
    function closeAdd() { document.getElementById('add-overlay').classList.remove('active'); document.body.style.overflow=''; document.getElementById('add-name').value=''; document.getElementById('igdb-results').innerHTML=''; document.getElementById('manual-add').style.display='none'; }
    document.getElementById('add-close').addEventListener('click', closeAdd);
    document.getElementById('add-overlay').addEventListener('click', e => { if(e.target===document.getElementById('add-overlay')) closeAdd(); });
    document.querySelectorAll('.add-tab').forEach(btn => { btn.addEventListener('click',()=>{ document.querySelectorAll('.add-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); addTab=btn.dataset.addtab; }); });

    let igdbTimer;
    document.getElementById('add-name').addEventListener('input', () => {
      clearTimeout(igdbTimer);
      const q = document.getElementById('add-name').value.trim();
      if (q.length<2) { document.getElementById('igdb-results').innerHTML=''; return; }
      igdbTimer = setTimeout(()=>searchIGDB(q), 400);
    });

    async function searchIGDB(q) {
      document.getElementById('igdb-results').innerHTML='<div class="igdb-loading">SEARCHING...</div>';
      try {
        const res  = await fetch(`${IGDB}?search=${encodeURIComponent(q)}&_=${Date.now()}`);
        const data = await res.json();
        if (!data.length) { document.getElementById('igdb-results').innerHTML='<div class="igdb-loading">NO RESULTS. <span class="igdb-link" id="ml">ADD MANUALLY</span></div>'; document.getElementById('ml')?.addEventListener('click',()=>{ document.getElementById('manual-add').style.display='block'; document.getElementById('igdb-results').innerHTML=''; }); return; }
        document.getElementById('igdb-results').innerHTML='';
        data.slice(0,30).forEach(g => {
          const row=document.createElement('div'); row.className='igdb-row';
          row.innerHTML=`${g.cover?`<img src="https://images.igdb.com/igdb/image/upload/t_cover_small/${g.cover.image_id}.jpg" class="igdb-thumb" alt=""/>`:'<div class="igdb-thumb-ph"></div>'}<div><div class="igdb-name">${g.name}</div><div class="igdb-year">${g.first_release_date?new Date(g.first_release_date*1000).getFullYear():'—'}</div></div>`;
          row.addEventListener('click',()=>addGame(g));
          document.getElementById('igdb-results').appendChild(row);
        });
      } catch(e) { document.getElementById('igdb-results').innerHTML='<div class="igdb-loading">CONNECTION ERROR.</div>'; }
    }

    function addTabCol(t){ return t==='completed'?'games':t==='backlog'?'backlog':'ours'; }
    function addTabArr(t){ return t==='completed'?completedGames:t==='backlog'?backlogGames:oursGames; }
    function addTabStatus(t){ return t==='completed'?'Completed':t==='backlog'?'To Play':'To Play'; }

    async function addGame(igdbGame) {
      const col = addTabCol(addTab);
      const arr = addTabArr(addTab);
      const n   = arr.length ? Math.max(...arr.map(x=>x.number||0))+1 : 1;
      const newGame = {
        number:n, title:igdbGame.name,
        coverUrl: igdbGame.cover?`https://images.igdb.com/igdb/image/upload/t_cover_big/${igdbGame.cover.image_id}.jpg`:null,
        genre: igdbGame.genres?.map(g=>g.name).join(' · ')||'',
        developer: igdbGame.involved_companies?.find(c=>c.developer)?.company?.name||'',
        year: igdbGame.first_release_date?new Date(igdbGame.first_release_date*1000).getFullYear():null,
        description: igdbGame.summary||'', review:'', comments:'', rating:0, metacritic:null, hltb:'', platform:'', hoursPlayed:null, status:addTabStatus(addTab)
      };
      const ref = await addDoc(collection(db,col),newGame);
      arr.push({id:ref.id,...newGame});
      closeAdd(); updateCounts(); buildGenreBar(); buildPills(); renderCurrentView();
      showToast(newGame.title+' added','New entry unlocked','+'); playClick();
    }

    document.getElementById('btn-manual-add').addEventListener('click', async () => {
      const title=document.getElementById('add-name').value.trim(); if(!title) return;
      const col=addTabCol(addTab), arr=addTabArr(addTab);
      const n=arr.length?Math.max(...arr.map(x=>x.number||0))+1:1;
      const newGame={number:n,title,year:parseInt(document.getElementById('add-year').value)||null,genre:document.getElementById('add-genre').value.trim(),developer:document.getElementById('add-dev').value.trim(),coverUrl:null,description:'',review:'',comments:'',rating:0,metacritic:null,hltb:'',platform:'',hoursPlayed:null,status:addTabStatus(addTab)};
      const ref=await addDoc(collection(db,col),newGame); arr.push({id:ref.id,...newGame});
      closeAdd(); updateCounts(); buildGenreBar(); buildPills(); renderCurrentView();
      showToast(title+' added','','+'); playClick();
    });

    // ── BOOT ─────────────────────────────────
    loadAll();

  </script>
</body>
</html>
